services:
  - type: web
    name: nf-entrada
    runtime: python
    branch: test
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.maxUploadSize 1024
    envVars:
      - key: DATABASE_URL
        sync: false
